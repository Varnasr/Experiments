[build]
  command = "npm run build"
  functions = "netlify/functions"

[functions]
  # ship CJS without esbuild to avoid fileURLToPath shims
  node_bundler = "none"
  included_files = ["netlify/functions/bin/**"]

[[redirects]]
  from = "/api/compile"
  to = "/.netlify/functions/compile"
  status = 200
