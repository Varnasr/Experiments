name: Auto-update tracker data

on:
  schedule:
    # Run weekly on Mondays at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate JSON from CSV
        run: |
          python3 scripts/csv_to_json.py

      - name: Update changelog
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          COUNT=$(python3 -c "import json; print(len(json.load(open('data/projects.json'))))")
          echo "## $DATE — Auto-update" >> CHANGELOG.md
          echo "- Total projects: $COUNT" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/projects.json CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore: auto-update tracker data $(date -u +%Y-%m-%d)"
          git push
